<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Watch case -->
  <rect x="130" y="90" width="140" height="120" rx="12" fill="#2a2a4a" stroke="#6a6a9a" stroke-width="2"/>
  <!-- Watch face -->
  <rect x="145" y="103" width="110" height="94" rx="8" fill="#0f0f1f" stroke="#5a5a8a" stroke-width="1"/>
  <!-- Watch hands - slightly off -->
  <line x1="200" y1="150" x2="200" y2="122" stroke="#c0c0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="150" x2="220" y2="158" stroke="#c0c0e0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnetic field lines -->
  <path d="M80 80 Q60 150 80 220" stroke="#5a8aff" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  <path d="M90 90 Q70 150 90 210" stroke="#5a8aff" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- Magnet symbol left -->
  <rect x="40" y="130" width="30" height="40" rx="4" fill="#3a3a6a" stroke="#5a5aaa" stroke-width="1.5"/>
  <text x="55" y="148" font-family="monospace" font-size="11" fill="#8a8aff" text-anchor="middle">N</text>
  <text x="55" y="163" font-family="monospace" font-size="11" fill="#ff8a8a" text-anchor="middle">S</text>
  <!-- Magnetic field lines right -->
  <path d="M320 80 Q340 150 320 220" stroke="#5a8aff" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
  <path d="M310 90 Q330 150 310 210" stroke="#5a8aff" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <!-- Magnet symbol right -->
  <rect x="330" y="130" width="30" height="40" rx="4" fill="#3a3a6a" stroke="#5a5aaa" stroke-width="1.5"/>
  <text x="345" y="148" font-family="monospace" font-size="11" fill="#ff8a8a" text-anchor="middle">S</text>
  <text x="345" y="163" font-family="monospace" font-size="11" fill="#8a8aff" text-anchor="middle">N</text>
  <!-- Warning indicator on watch -->
  <circle cx="200" cy="178" r="8" fill="#ff6a3a" opacity="0.8"/>
  <text x="200" y="182" font-family="monospace" font-size="10" fill="white" text-anchor="middle">!</text>
</svg>
