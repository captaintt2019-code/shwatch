<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#1a1a2e"/>
  <!-- Watch case -->
  <rect x="130" y="80" width="140" height="140" rx="12" fill="#2a2a4a" stroke="#6a6a9a" stroke-width="2"/>
  <!-- Watch face -->
  <rect x="145" y="93" width="110" height="114" rx="8" fill="#0f0f1f" stroke="#5a5a8a" stroke-width="1"/>
  <!-- Crown (right side, screwed position) -->
  <rect x="268" y="145" width="18" height="10" rx="3" fill="#3a3a6a" stroke="#6a6a9a" stroke-width="1.5"/>
  <!-- Crown knurling -->
  <line x1="271" y1="146" x2="271" y2="154" stroke="#8a8ab0" stroke-width="1"/>
  <line x1="275" y1="146" x2="275" y2="154" stroke="#8a8ab0" stroke-width="1"/>
  <line x1="279" y1="146" x2="279" y2="154" stroke="#8a8ab0" stroke-width="1"/>
  <line x1="283" y1="146" x2="283" y2="154" stroke="#8a8ab0" stroke-width="1"/>
  <!-- Screw lock indicator -->
  <circle cx="286" cy="150" r="6" fill="none" stroke="#4aaa4a" stroke-width="1.5"/>
  <path d="M283 150 L286 147 L289 150" stroke="#4aaa4a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Calendar window -->
  <rect x="210" y="140" width="28" height="20" rx="2" fill="#1a2a4a" stroke="#5a7a9a" stroke-width="1"/>
  <text x="224" y="154" font-family="monospace" font-size="11" fill="#aad0ff" text-anchor="middle">12</text>
  <!-- Hour markers on dial -->
  <line x1="200" y1="99" x2="200" y2="105" stroke="#6a6a9a" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="195" x2="200" y2="201" stroke="#6a6a9a" stroke-width="2" stroke-linecap="round"/>
  <line x1="151" y1="150" x2="157" y2="150" stroke="#6a6a9a" stroke-width="2" stroke-linecap="round"/>
  <!-- Safe zone arc (9-3 position, avoiding 9-12 danger zone) -->
  <path d="M157 150 A43 43 0 0 1 243 150" stroke="#4aaa4a" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <path d="M157 150 A43 43 0 0 0 200 107" stroke="#ff6a3a" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <!-- Clock hands -->
  <line x1="200" y1="150" x2="200" y2="118" stroke="#d0d0f0" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="150" x2="225" y2="155" stroke="#d0d0f0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
